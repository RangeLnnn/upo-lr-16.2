<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Личный кабинет</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
            <h2 class="fw-bold text-secondary">Личный кабинет</h2>
            <a href="/shop/catalog/" class="btn btn-outline-primary">В каталог</a>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-primary text-white py-3">
                        <h5 class="card-title mb-0 fw-semibold">Профиль пользователя</h5>
                    </div>
                    <div class="card-body p-4">
                        <form id="profile-form">
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase fw-bold">Логин</label>
                                <input type="text" id="prof-username" class="form-control bg-white" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase fw-bold">ФИО</label>
                                <input type="text" id="prof-name" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase fw-bold">Телефон</label>
                                <input type="text" id="prof-phone" class="form-control">
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-muted small uppercase fw-bold">Адрес доставки</label>
                                <textarea id="prof-address" class="form-control" rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn btn-success w-100 py-2 fw-semibold">Сохранить изменения</button>
                        </form>
                        <div id="profile-alert" class="alert mt-3 d-none"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card border-0 shadow-sm">
                    <div class="card-header bg-dark text-white py-3">
                        <h5 class="card-title mb-0 fw-semibold">История заказов</h5>
                    </div>
                    <div class="card-body p-4">
                        <div class="table-responsive">
                            <table class="table table-hover align-middle mb-0">
                                <thead class="table-light text-secondary small uppercase">
                                    <tr>
                                        <th class="py-3">ID заказа</th>
                                        <th class="py-3">Дата оформления</th>
                                        <th class="py-3">Статус</th>
                                        <th class="py-3">Итоговая сумма</th>
                                        <th class="py-3 text-end">Действие</th>
                                    </tr>
                                </thead>
                                <tbody id="orders-rows">
                                    <tr>
                                        <td colspan="5" class="text-center py-4 text-muted">Загрузка списка заказов...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            function getCookie(name) {
                let cookieValue = null;
                if (document.cookie && document.cookie !== '') {
                    const cookies = document.cookie.split(';');
                    for (let i = 0; i < cookies.length; i++) {
                        const cookie = cookies[i].trim();
                        if (cookie.substring(0, name.length + 1) === (name + '=')) {
                            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                            break;
                        }
                    }
                }
                return cookieValue;
            }
            const csrftoken = getCookie('csrftoken');

            function handleAuthError() {
                document.body.innerHTML = `
                    <div class="container text-center my-5 py-5">
                        <div class="alert alert-warning d-inline-block px-4 py-3 shadow-sm">
                            Доступ ограничен. Вы не авторизованы или сессия истекла (Ошибка 401/403).
                        </div>
                        <br><a href="/shop/login/" class="btn btn-primary mt-2">Войти в систему</a>
                    </div>`;
            }

            function customFetch(url, options = {}) {
                options.credentials = 'include';
                
                if (options.method && ['POST', 'PUT', 'PATCH', 'DELETE'].includes(options.method.toUpperCase())) {
                    options.headers = options.headers || {};
                    options.headers['X-CSRFToken'] = csrftoken;
                }

                const token = localStorage.getItem('accessToken');
                if (token) {
                    options.headers = options.headers || {};
                    options.headers['Authorization'] = `Bearer ${token}`;
                }

                return fetch(url, options).then(response => {
                    if (response.status === 401 || response.status === 403) {
                        handleAuthError();
                        throw new Error(`Ошибка авторизации: ${response.status}`);
                    }
                    return response;
                });
            }

            // Загрузка данных профиля
            customFetch('/shop/api/me/')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('prof-username').value = data.username || '';
                    document.getElementById('prof-name').value = data.full_name || '';
                    document.getElementById('prof-phone').value = data.phone || '';
                    document.getElementById('prof-address').value = data.address || '';
                })
                .catch(err => console.error('Ошибка загрузки профиля:', err));

            // Загрузка истории заказов
            customFetch('/shop/api/orders/')
                .then(response => response.json())
                .then(orders => {
                    const tbody = document.getElementById('orders-rows');
                    tbody.innerHTML = '';
                    
                    if (orders.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-muted">Список заказов пуст</td></tr>';
                        return;
                    }

                    orders.forEach(order => {
                        let statusBadge = '<span class="badge bg-warning text-dark px-2.5 py-1.5 rounded">Новый</span>';
                        if (order.status === 'PAID') statusBadge = '<span class="badge bg-success px-2.5 py-1.5 rounded">Оплачен</span>';
                        if (order.status === 'DELIVERED') statusBadge = '<span class="badge bg-info text-dark px-2.5 py-1.5 rounded">Доставлен</span>';

                        const date = new Date(order.created_at).toLocaleDateString('ru-RU');

                        const row = `
                            <tr>
                                <td class="fw-bold text-primary">#${order.id}</td>
                                <td class="text-muted">${date}</td>
                                <td>${statusBadge}</td>
                                <td class="fw-semibold">${order.total_price} руб.</td>
                                <td class="text-end">
                                    <button class="btn btn-sm btn-outline-primary px-3" onclick="showOrderDetails(${order.id})">Подробнее</button>
                                </td>
                            </tr>`;
                        tbody.insertAdjacentHTML('beforeend', row);
                    });
                })
                .catch(err => console.error('Ошибка загрузки заказов:', err));

            // Сохранение изменений профиля
            document.getElementById('profile-form').addEventListener('submit', function(e) {
                e.preventDefault();
                const alertDiv = document.getElementById('profile-alert');
                
                const payload = {
                    full_name: document.getElementById('prof-name').value,
                    phone: document.getElementById('prof-phone').value,
                    address: document.getElementById('prof-address').value
                };

                customFetch('/shop/api/me/', {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(payload)
                })
                .then(response => response.json())
                .then(() => {
                    alertDiv.className = "alert alert-success mt-3 py-2 small text-center shadow-sm";
                    alertDiv.innerText = "Изменения успешно сохранены";
                    alertDiv.classList.remove('d-none');
                })
                .catch(err => {
                    console.error('Ошибка сохранения профиля:', err);
                    alertDiv.className = "alert alert-danger mt-3 py-2 small text-center shadow-sm";
                    alertDiv.innerText = "Не удалось сохранить данные профиля";
                    alertDiv.classList.remove('d-none');
                });
            });

            // Просмотр состава заказа
            window.showOrderDetails = function(orderId) {
                customFetch(`/shop/api/orders/${orderId}/`)
                    .then(response => response.json())
                    .then(order => {
                        let itemsList = '';
                        order.items.forEach(item => {
                            itemsList += `- ${item.product_name}: ${item.quantity} шт. х ${item.price} руб.\n`;
                        });
                        alert(`Детали заказа №${order.id}\nСтатус: ${order.status}\nИтого: ${order.total_price} руб.\n\nСостав:\n${itemsList}`);
                    })
                    .catch(err => console.error('Ошибка загрузки деталей заказа:', err));
            };
        });
    </script>
</body>
</html>
