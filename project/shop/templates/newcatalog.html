{% extends 'base.html' %}
{% load static %}

{% block title %}Каталог товаров{% endblock %}

{% block content %}
<div class="row">
    
    <div class="col-md-3 mb-4">
        <div class="card">
            <div class="card-header bg-primary text-white">
                <h5 class="mb-0">Фильтры</h5>
            </div>
            <div class="card-body">
                <form method="get" action="{% url 'catalog' %}">
                    
                    <div class="mb-3">
                        <label for="search" class="form-label">Поиск по названию</label>
                        <input type="text" class="form-control" id="search" name="search" value="{{ request.GET.search }}">
                    </div>
                    
                    <div class="mb-3">
                        <label for="category" class="form-label">Категория</label>
                        <select class="form-select" id="category" name="category">
                            <option value="">Все категории</option>
                            {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if request.GET.category == cat.id|stringformat:"s" %}selected{% endif %}>{{ cat.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label for="manufacturer" class="form-label">Производитель</label>
                        <select class="form-select" id="manufacturer" name="manufacturer">
                            <option value="">Все производители</option>
                            {% for man in manufacturers %}
                                <option value="{{ man.id }}" {% if request.GET.manufacturer == man.id|stringformat:"s" %}selected{% endif %}>{{ man.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-100">Применить</button>
                    <a href="{% url 'catalog' %}" class="btn btn-outline-secondary w-100 mt-2">Сбросить</a>
                </form>
            </div>
        </div>
    </div>
    
    <div class="col-md-9">
        <h2 class="mb-4">Список товаров</h2>
        
        <div id="product-list" class="row">
            <div class="text-center py-5">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Загрузка...</span>
                </div>
                <p class="mt-2 text-muted">Выполняется загрузка товаров...</p>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}
